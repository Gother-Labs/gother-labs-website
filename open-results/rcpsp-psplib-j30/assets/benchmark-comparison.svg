<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 520" role="img" aria-label="Baseline versus accepted RCPSP benchmark comparison">
  <style>
    .bg{fill:#050608}.panel{fill:#090d13;stroke:#242b38;stroke-width:1}.track{fill:#151b26;stroke:#283142;stroke-width:1}.muted{fill:#8f98aa;font:13px Inter,Arial,sans-serif}.label{fill:#cbd5e1;font:14px Inter,Arial,sans-serif}.title{fill:#f8fafc;font:600 22px Inter,Arial,sans-serif}.value{fill:#f8fafc;font:700 20px Inter,Arial,sans-serif}.seed{fill:#667085}.accepted{fill:#168cff}.good{fill:#168cff}.delta{fill:#168cff;font:700 18px Inter,Arial,sans-serif}.axis{stroke:#343c4d;stroke-width:1}.tick{fill:#8f98aa;font:12px Inter,Arial,sans-serif}
  </style>
  <rect class="bg" width="1040" height="520"/>
  <text x="64" y="48" class="title">Acceptance objective</text>
  <text x="976" y="48" class="muted" text-anchor="end">lower score is better</text>

  <g transform="translate(64 86)">
    <rect class="panel" width="912" height="246"/>
    <path d="M773 82H897M773 72V92M897 72V92" stroke="#168cff" stroke-width="2" fill="none"/>
    <text x="835" y="62" class="delta" text-anchor="middle">15.55% reduction</text>
    <rect class="track" x="64" y="118" width="840" height="44"/>
    <rect class="seed" x="64" y="118" width="801" height="44"/>
    <rect class="accepted" x="64" y="118" width="677" height="44"/>
    <path class="axis" d="M865 100V184"/>
    <path d="M741 100V184" stroke="#168cff" stroke-width="2"/>
    <text x="888" y="128" class="muted" text-anchor="end">seed</text>
    <text x="888" y="153" class="value" text-anchor="end">14.312</text>
    <text x="741" y="200" class="muted" text-anchor="middle">accepted</text>
    <text x="741" y="224" class="value" text-anchor="middle">12.087</text>
    <path class="axis" d="M64 230H904"/>
    <text class="tick" x="64" y="256">0</text>
    <text class="tick" x="484" y="256" text-anchor="middle">7.5</text>
    <text class="tick" x="904" y="256" text-anchor="middle">15</text>
  </g>

  <g transform="translate(64 354)">
    <rect class="panel" width="206" height="132"/>
    <text x="18" y="32" class="muted">Mean gap</text>
    <rect x="18" y="58" width="156" height="16" class="track"/>
    <rect x="18" y="58" width="48" height="16" class="accepted"/>
    <text x="18" y="104" class="value">6.04%</text>
  </g>
  <g transform="translate(296 354)">
    <rect class="panel" width="206" height="132"/>
    <text x="18" y="32" class="muted">p95 gap</text>
    <rect x="18" y="58" width="156" height="16" class="track"/>
    <rect x="18" y="58" width="135" height="16" class="accepted"/>
    <text x="18" y="104" class="value">17.28%</text>
  </g>
  <g transform="translate(528 354)">
    <rect class="panel" width="206" height="132"/>
    <text x="18" y="32" class="muted">Valid schedules</text>
    <rect x="18" y="58" width="156" height="16" class="track"/>
    <rect x="18" y="58" width="156" height="16" class="good"/>
    <text x="18" y="104" class="value">80 / 80</text>
  </g>
  <g transform="translate(760 354)">
    <rect class="panel" width="216" height="132"/>
    <text x="18" y="32" class="muted">Optimal hit rate</text>
    <rect x="18" y="58" width="166" height="16" class="track"/>
    <rect x="18" y="58" width="39" height="16" class="accepted"/>
    <text x="18" y="104" class="value">23.75%</text>
  </g>
  <text x="64" y="512" class="muted">Feasibility penalty remained zero; the readout is bounded to the frozen 80-instance portfolio.</text>
</svg>
