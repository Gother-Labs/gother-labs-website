<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" role="img" aria-label="Renewable resource load profile for an RCPSP schedule">
  <style>
    .bg{fill:#050608}.panel{fill:#080b10;stroke:#252a34;stroke-width:1}.title{font:600 24px Inter,Arial,sans-serif;fill:#f8fafc}.sub{font:13px Inter,Arial,sans-serif;fill:#9aa3b3}.axis{stroke:#4a5364;stroke-width:1.2;fill:none}.grid{stroke:#222a36;stroke-width:1}.cap{stroke:#f8fafc;stroke-width:1.4;stroke-dasharray:6 6}.load{fill:#168cff;opacity:.6}.loadHot{fill:#168cff;opacity:.88}.tick{font:12px Inter,Arial,sans-serif;fill:#9aa3b3}.label{font:700 12px Inter,Arial,sans-serif;fill:#d8e1ef}.window{fill:#168cff;opacity:.12;stroke:#168cff;stroke-width:1}
  </style>
  <rect class="bg" width="960" height="380"/>
  <rect class="panel" x="58" y="44" width="844" height="286"/>
  <text class="title" x="96" y="84">Renewable resource load</text>
  <text class="sub" x="96" y="116">A schedule is feasible only while every time bucket stays at or below capacity.</text>

  <g transform="translate(132 154)">
    <path class="grid" d="M66 144H760M66 108H760M66 72H760M66 36H760"/>
    <path class="axis" d="M66 0V174H760"/>
    <text class="tick" x="44" y="148" text-anchor="end">0</text>
    <text class="tick" x="44" y="112" text-anchor="end">1</text>
    <text class="tick" x="44" y="76" text-anchor="end">2</text>
    <text class="tick" x="44" y="40" text-anchor="end">3</text>
    <path class="cap" d="M66 54H760"/>
    <text class="label" x="742" y="46" text-anchor="end">capacity</text>
    <rect class="load" x="86" y="108" width="58" height="66"/>
    <rect class="load" x="158" y="72" width="58" height="102"/>
    <rect class="loadHot" x="230" y="36" width="58" height="138"/>
    <rect class="loadHot" x="302" y="54" width="58" height="120"/>
    <rect class="load" x="374" y="72" width="58" height="102"/>
    <rect class="load" x="446" y="96" width="58" height="78"/>
    <rect class="load" x="518" y="120" width="58" height="54"/>
    <rect class="load" x="590" y="132" width="58" height="42"/>
    <rect class="window" x="224" y="24" width="148" height="150"/>
    <text class="tick" x="66" y="198">0</text>
    <text class="tick" x="297" y="198" text-anchor="middle">20</text>
    <text class="tick" x="528" y="198" text-anchor="middle">40</text>
    <text class="tick" x="760" y="198" text-anchor="end">60</text>
    <text class="label" x="413" y="224" text-anchor="middle">time bucket</text>
    <text class="label" x="0" y="86" transform="rotate(-90 0 86)" text-anchor="middle">active demand</text>
  </g>
</svg>
