<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="RCPSP schedule readout with precedence network and Gantt schedule">
  <style>
    .bg{fill:#050608}.panel{fill:#080b10;stroke:#252a34;stroke-width:1}.title{font:600 24px Inter,Arial,sans-serif;fill:#f8fafc}.sub{font:13px Inter,Arial,sans-serif;fill:#9aa3b3}.axis{stroke:#4a5364;stroke-width:1.2;fill:none}.grid{stroke:#222a36;stroke-width:1}.bar{fill:#168cff;opacity:.88}.bar2{fill:#168cff;opacity:.52}.barText{font:700 12px Inter,Arial,sans-serif;fill:#050608}.node{fill:#050608;stroke:#168cff;stroke-width:2}.nodeHot{stroke:#f8fafc}.edge{stroke:#697386;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.mk{stroke:#f8fafc;stroke-width:1.8}.label{font:700 12px Inter,Arial,sans-serif;fill:#d8e1ef}.tick{font:12px Inter,Arial,sans-serif;fill:#9aa3b3}.note{font:12px Inter,Arial,sans-serif;fill:#8f98aa}
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#697386"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="520"/>
  <rect class="panel" x="58" y="42" width="844" height="430"/>
  <text class="title" x="96" y="84">RCPSP schedule readout</text>
  <text class="sub" x="96" y="116">The candidate ranks eligible activities; the evaluator commits them to a feasible Gantt schedule.</text>

  <g transform="translate(96 154)">
    <text class="label" x="0" y="0">precedence network</text>
    <path class="edge" d="M58 50H176"/>
    <path class="edge" d="M58 50C114 100 166 112 226 112"/>
    <path class="edge" d="M214 50H382"/>
    <path class="edge" d="M262 112C318 98 358 72 418 50"/>
    <path class="edge" d="M454 50H626"/>
    <circle class="node" cx="34" cy="50" r="18"/><text class="label" x="34" y="55" text-anchor="middle">0</text>
    <circle class="node" cx="194" cy="50" r="18"/><text class="label" x="194" y="55" text-anchor="middle">A</text>
    <circle class="node" cx="244" cy="112" r="18"/><text class="label" x="244" y="117" text-anchor="middle">B</text>
    <circle class="node nodeHot" cx="436" cy="50" r="18"/><text class="label" x="436" y="55" text-anchor="middle">C</text>
    <circle class="node" cx="652" cy="50" r="18"/><text class="label" x="652" y="55" text-anchor="middle">T</text>
    <text class="note" x="0" y="152">A task becomes eligible only after all predecessor arcs are satisfied.</text>
  </g>

  <g transform="translate(96 340)">
    <text class="label" x="0" y="-24">Gantt schedule</text>
    <path class="axis" d="M78 116H760"/>
    <path class="grid" d="M78 12H760M78 46H760M78 80H760"/>
    <text class="tick" x="0" y="22">lane 1</text>
    <text class="tick" x="0" y="56">lane 2</text>
    <text class="tick" x="0" y="90">lane 3</text>
    <text class="tick" x="78" y="138">0</text>
    <text class="tick" x="305" y="138" text-anchor="middle">20</text>
    <text class="tick" x="532" y="138" text-anchor="middle">40</text>
    <text class="tick" x="760" y="138" text-anchor="end">60</text>
    <rect class="bar" x="96" y="2" width="104" height="22" rx="3"/><text class="barText" x="108" y="17">A1</text>
    <rect class="bar" x="210" y="36" width="178" height="22" rx="3"/><text class="barText" x="222" y="51">A2</text>
    <rect class="bar2" x="398" y="36" width="204" height="22" rx="3"/><text class="barText" x="410" y="51">A4</text>
    <rect class="bar" x="274" y="70" width="236" height="22" rx="3"/><text class="barText" x="286" y="85">A3</text>
    <rect class="bar" x="618" y="70" width="106" height="22" rx="3"/><text class="barText" x="630" y="85">A5</text>
    <line class="mk" x1="724" y1="-8" x2="724" y2="116"/><text class="tick" x="736" y="2">Cmax</text>
  </g>
</svg>
